name: Build Plugin
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn package
      - uses: actions/upload-artifact@v4
        with:
          name: TimeBracket
          path: target/TimeBracket-1.0.jar
